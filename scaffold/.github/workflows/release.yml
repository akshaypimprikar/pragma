# =============================================================================
# SETUP: Replace the following placeholders before using this workflow:
#   YOUR_PROJECT   — your Xcode project name, e.g. MyApp
#   YOUR_SCHEME    — your Xcode scheme name (often the same as YOUR_PROJECT)
# =============================================================================

name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release-tests:
    name: Release Tests (Unit + Integration)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '~26.4'

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: deriveddata-release-${{ runner.os }}-${{ hashFiles('YOUR_PROJECT/**/*.swift', 'YOUR_PROJECTTests/**/*.swift') }}
          restore-keys: |
            deriveddata-release-${{ runner.os }}-

      - name: Run unit and integration tests (Release)
        run: |
          set -o pipefail
          SIM_ID=$(xcrun simctl list devices available -j | python3 scripts/select_simulator.py)
          echo "Selected simulator: $SIM_ID"
          xcodebuild test \
            -project YOUR_PROJECT.xcodeproj \
            -scheme YOUR_SCHEME \
            -configuration Release \
            -destination "id=$SIM_ID" \
            -skip-testing:YOUR_PROJECTUITests \
            -resultBundlePath result.xcresult \
            2>&1 | tee xcode.log
          grep -E "TEST SUCCEEDED|TEST FAILED" xcode.log

      - name: Check coverage
        run: |
          xcrun xccov view --report --json result.xcresult > coverage.json
          python3 scripts/check_coverage.py coverage.json

      - name: Zip test results
        if: always()
        run: zip -r release-tests.xcresult.zip result.xcresult

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-tests-${{ github.ref_name }}
          path: release-tests.xcresult.zip

  release-ui-tests:
    name: Release UI Tests
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '~26.4'

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: deriveddata-release-ui-${{ runner.os }}-${{ hashFiles('YOUR_PROJECT/**/*.swift', 'YOUR_PROJECTUITests/**/*.swift') }}
          restore-keys: |
            deriveddata-release-ui-${{ runner.os }}-

      - name: Run UI tests (Release)
        run: |
          set -o pipefail
          SIM_ID=$(xcrun simctl list devices available -j | python3 scripts/select_simulator.py)
          echo "Selected simulator: $SIM_ID"
          xcodebuild test \
            -project YOUR_PROJECT.xcodeproj \
            -scheme YOUR_SCHEME \
            -configuration Release \
            -destination "id=$SIM_ID" \
            -only-testing:YOUR_PROJECTUITests \
            -resultBundlePath ui-result.xcresult \
            2>&1 | tee xcode.log
          grep -E "TEST SUCCEEDED|TEST FAILED" xcode.log

      - name: Zip UI test results
        if: always()
        run: zip -r release-ui-tests.xcresult.zip ui-result.xcresult

      - name: Upload UI test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-ui-tests-${{ github.ref_name }}
          path: release-ui-tests.xcresult.zip

  create-github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [release-tests, release-ui-tests]
    permissions:
      contents: write
    steps:
      - name: Download test artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*-${{ github.ref_name }}
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create ${{ github.ref_name }} \
            --generate-notes \
            release-tests.xcresult.zip \
            release-ui-tests.xcresult.zip

