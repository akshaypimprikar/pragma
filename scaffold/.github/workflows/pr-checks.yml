# =============================================================================
# SETUP: Replace the following placeholders before using this workflow:
#   YOUR_PROJECT   — your Xcode project name, e.g. MyApp
#                    (used for .xcodeproj, path filters, scheme, and test targets)
#   YOUR_SCHEME    — your Xcode scheme name (often the same as YOUR_PROJECT)
#
# Also ensure the following scripts exist in your repo:
#   scripts/select_simulator.py   — selects an available iPhone simulator UDID
#   scripts/check_coverage.py     — enforces coverage thresholds from xccov JSON
# Both scripts are included in this scaffold under scripts/.
# =============================================================================

name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [develop, main]
    paths:
      - 'YOUR_PROJECT/**'
      - 'YOUR_PROJECTTests/**'
      - 'YOUR_PROJECTUITests/**'
      - 'scripts/**'

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '~26.4'

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: deriveddata-${{ runner.os }}-${{ hashFiles('YOUR_PROJECT/**/*.swift', 'YOUR_PROJECTTests/**/*.swift') }}
          restore-keys: |
            deriveddata-${{ runner.os }}-

      - name: Run unit and integration tests
        run: |
          set -o pipefail
          SIM_ID=$(xcrun simctl list devices available -j | python3 scripts/select_simulator.py)
          echo "Selected simulator: $SIM_ID"
          xcodebuild test \
            -project YOUR_PROJECT.xcodeproj \
            -scheme YOUR_SCHEME \
            -destination "id=$SIM_ID" \
            -skip-testing:YOUR_PROJECTUITests \
            -resultBundlePath result.xcresult \
            2>&1 | tee xcode.log
          grep -E "TEST SUCCEEDED|TEST FAILED" xcode.log

      - name: Check coverage
        run: |
          xcrun xccov view --report --json result.xcresult > coverage.json
          python3 scripts/check_coverage.py coverage.json
