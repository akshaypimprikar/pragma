# =============================================================================
# SETUP: Replace the following placeholders before using this workflow:
#   YOUR_PROJECT   — your Xcode project name, e.g. MyApp
#   YOUR_SCHEME    — your Xcode scheme name (often the same as YOUR_PROJECT)
# =============================================================================

name: UI Tests

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [develop, main]
    paths:
      - 'YOUR_PROJECT/**'
      - 'YOUR_PROJECTUITests/**'
  push:
    branches: [develop, main]
    paths:
      - 'YOUR_PROJECT/**'
      - 'YOUR_PROJECTUITests/**'

concurrency:
  group: ui-tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ui-tests:
    name: UI Tests
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '~26.4'

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: deriveddata-ui-${{ runner.os }}-${{ hashFiles('YOUR_PROJECT/**/*.swift', 'YOUR_PROJECTUITests/**/*.swift') }}
          restore-keys: |
            deriveddata-ui-${{ runner.os }}-

      - name: Run UI tests
        run: |
          set -o pipefail
          SIM_ID=$(xcrun simctl list devices available -j | python3 scripts/select_simulator.py)
          echo "Selected simulator: $SIM_ID"
          xcodebuild test \
            -project YOUR_PROJECT.xcodeproj \
            -scheme YOUR_SCHEME \
            -destination "id=$SIM_ID" \
            -only-testing:YOUR_PROJECTUITests \
            2>&1 | tee xcode.log
          grep -E "TEST SUCCEEDED|TEST FAILED" xcode.log
